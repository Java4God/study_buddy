spring.application.name=Study-buddy

spring.datasource.url=jdbc:postgresql://localhost:5432/studybuddy
spring.datasource.username=postgres
spring.datasource.password=javurina
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.flyway.enabled=true

# Mail configuration - credentials u application-local.properties (gitignored)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App config
app.mail.from=studybuddyreal@gmail.com
app.frontend.url=http://localhost:3000

# JPA cleanup
spring.jpa.open-in-view=false