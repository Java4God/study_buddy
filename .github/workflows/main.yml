name: Full Stack Tests with Coverage

on:
  push:
    branches: [main, master, feat/cicd-fe-testing]
  pull_request:
    branches: [main, master, feat/cicd-fe-testing]

jobs:
  backend-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: studybuddy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        working-directory: ./Backend
        run: chmod +x ./mvnw

      - name: Run backend tests with PostgreSQL
        working-directory: ./Backend
        run: ./mvnw -X clean test -Dspring.profiles.active=ci 2>&1 | tee test-output.log
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: studybuddy
          PGUSER: postgres
          PGPASSWORD: postgres
          APP_FRONTEND_URL: http://localhost:3000

      - name: Flag skipped tests for review
        if: always()
        run: |
          echo "⚠️ SKIPPED TESTS - TODO: Fix these before production"
          echo "=================================================="
          echo "1. ChatRestControllerTest (4 tests)"
          echo "   - Issue: User authentication null in mocked tests"
          echo "   - Fix: Mock SecurityContext properly for REST endpoints"
          echo ""
          echo "2. ChatServiceImplTest (2 tests)"
          echo "   - Issue: UnsupportedOperationException on list reversal"
          echo "   - Fix: Ensure test data collections support reversal"
          echo ""
          echo "See Backend/target/surefire-reports/ for detailed test results"

      - name: Generate JaCoCo coverage report
        working-directory: ./Backend
        run: ./mvnw -X jacoco:report
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: studybuddy
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: jacoco-report
          path: Backend/target/site/jacoco/
          retention-days: 30

  frontend-tests:
    needs: backend-tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build backend JAR
        working-directory: ./Backend
        run: |
          chmod +x ./mvnw
          ./mvnw -X clean package -DskipTests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: studybuddy
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: Start backend server in background
        working-directory: ./Backend
        run: |
          java -jar target/*.jar \
            --spring.profiles.active=ci \
            --debug \
            --logging.level.org.springframework.boot.autoconfigure=DEBUG \
            > /tmp/backend.log 2>&1 &
          sleep 15
          echo "Backend started"
          if ! curl -f http://localhost:8080/actuator/health 2>/dev/null; then
            echo "WARNING: Backend health check failed. Showing logs:"
            cat /tmp/backend.log | tail -50
          fi
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: studybuddy
          PGUSER: postgres
          PGPASSWORD: postgres
          APP_FRONTEND_URL: http://localhost:3000

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && exit 0
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload backend logs if tests failed
        if: failure()
        run: cat /tmp/backend.log
