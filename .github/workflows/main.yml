name: Full Stack Tests with Coverage

on:
  push:
    branches: [main, master, feat/cicd-fe-testing]
  pull_request:
    branches: [main, master, feat/cicd-fe-testing]

jobs:
  backend-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        working-directory: ./Backend
        run: chmod +x ./mvnw

      - name: Run backend tests with H2
        working-directory: ./Backend
        run: ./mvnw clean test -Dspring.profiles.active=test

      - name: Generate JaCoCo coverage report
        working-directory: ./Backend
        run: ./mvnw jacoco:report

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: jacoco-report
          path: Backend/target/site/jacoco/
          retention-days: 30

  frontend-tests:
    needs: backend-tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build backend JAR
        working-directory: ./Backend
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests -q

      - name: Start backend server in background
        working-directory: ./Backend
        run: |
          java -jar target/*.jar --spring.profiles.active=test > /tmp/backend.log 2>&1 &
          sleep 10
          echo "Backend started"

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health 2>/dev/null | grep -q "UP"; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload backend logs if tests failed
        if: failure()
        run: cat /tmp/backend.log
